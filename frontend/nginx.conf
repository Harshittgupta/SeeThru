# nginx config for the built SPA (BUILD_PLAN T65).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SPA fallback: every non-file path serves index.html so client-side routes
    # like /analyze/:jobId work on a hard refresh or a shared link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API proxy. This is why the frontend uses a relative `/v1`
    # baseURL (T65): no CORS, no build-time env var baking one environment into
    # the image.
    location /v1 {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # MUST match the backend's video cap (200 MB), or a large upload dies at
        # the proxy with an opaque 413 before the API's own check ever runs.
        client_max_body_size 200m;

        # Video jobs are async (202 + poll), so no single request is long. But
        # the image path can take a couple of seconds -- give it headroom.
        proxy_read_timeout 120s;
    }

    # Hashed asset filenames are immutable; index.html must never be cached, or a
    # deploy leaves clients on stale JS pointing at old asset hashes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
